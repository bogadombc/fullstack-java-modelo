<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="Frontend da API de autuação de veículos, com gestão de proprietários, veículos e autuações."
    />
    <title>Sistema de Autuação de Veículos</title>
    <script>
      (() => {
        const chave = 'transito.tema';
        const salvo = window.localStorage.getItem(chave);
        const escuro = salvo
          ? salvo === 'escuro'
          : window.matchMedia('(prefers-color-scheme: dark)').matches;

        document.documentElement.classList.toggle('dark', escuro);
      })();
    </script>
  </head>
  <body>
    <div id="app"></div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
